# https://grafana.com/docs/loki/latest/configure/examples/configuration-examples/#1-local-configuration-exampleyaml
auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
  - from: "2020-10-24"
    store: tsdb
    object_store: filesystem
    schema: v13
    index:
      prefix: index_
      period: 1d

storage_config:
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m0s
  apply_retention_interval: 0s
  retention_enabled: true
  retention_delete_delay: 2h0m0s
  delete_request_store: ""
  delete_request_store_key_prefix: index/
  delete_request_store_db_type: boltdb

limits_config:
  retention_period: 15d